# Configuração para TESTES - Banco PostgreSQL dedicado
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/market_sv_test
spring.datasource.username=postgres
spring.datasource.password=1234

# JPA Configuration para testes
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=create-drop  
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20


# Desabilitar segurança para testes
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Pool de conexões menor para testes
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000